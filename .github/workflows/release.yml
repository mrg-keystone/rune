name: release

# Cut a release by pushing a version tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # allow manual runs (no upload unless a tag is present)

permissions:
  contents: write # needed to create the GitHub Release + upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13 # Intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Rust (cargo) is preinstalled on GitHub-hosted runners; build for the host.
      - name: Build rune + rune-lsp + rune-syntax
        run: deno task build

      # Ad-hoc sign on macOS so the binaries run; the installer also strips
      # quarantine on the user's side. (No paid Apple cert needed for a CLI tool.)
      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force dist/rune dist/rune-lsp dist/rune-syntax

      - name: Package
        run: |
          tar -C dist -czf "rune-${{ matrix.target }}.tar.gz" rune rune-lsp rune-syntax
          shasum -a 256 "rune-${{ matrix.target }}.tar.gz" > "rune-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rune-${{ matrix.target }}.tar.gz
            rune-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
