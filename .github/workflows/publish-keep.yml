name: publish-keep

# keep (keep/) -> JSR (@mrg-keystone/keep) + a rolling `keep-latest`
# GitHub release carrying keep's Claude skill + installer.
#
# Path-filtered to keep-owned facets: keep's source (-> JSR) and keep's skill at
# skills/keep (-> the keep-latest release). The JSR reusable auto-bumps
# keep/deno.json and commits "release: vX (auto-bump)" back to main; that commit
# touches only keep/** so it re-enters HERE as an idempotent no-op (version
# already published) and does NOT rebuild rune.
on:
  push:
    branches: [main]
    paths:
      - "keep/**"
      - "skills/keep/**"

permissions:
  contents: write

jobs:
  publish:
    uses: mrg-keystone/actions/.github/workflows/jsr-publish.yml@main
    with:
      working-directory: keep
    secrets:
      JSR_TOKEN: ${{ secrets.JSR_TOKEN }}

  # skills/ now holds BOTH skills (skills/rune + skills/keep); the gh-release
  # reusable's auto-pack would glob all of skills/*/. Pack ONLY keep's skill
  # explicitly from skills/keep and hand it over as an artifact.
  pack-skill:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4
      - name: Pack keep skill
        run: tar -C skills/keep -czf keep-skill.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: keep-skill
          path: keep-skill.tar.gz
          retention-days: 3

  skill-release:
    needs: [publish, pack-skill]
    uses: mrg-keystone/actions/.github/workflows/gh-release.yml@main
    permissions:
      contents: write
    with:
      # Explicit tag (make_latest=false) so keep's skill release never claims the
      # `latest` rolling release that rune owns.
      tag: keep-latest
      artifact-pattern: keep-skill
      pack-skills: false
      extra-assets: |
        keep/scripts/install.sh
