name: release-rune

# Deploy model (unchanged from rune's pre-monorepo release.yml):
#   - merge into `main`   -> rolling `latest` release (what install.sh pulls by default)
#   - push to `develop`   -> rolling `develop` release (RUNE_VERSION=develop)
#   - push a `vX.Y.Z` tag -> pinned snapshot release
# Builds (cross-compile + codesign) are rune-specific and run at the repo root
# (rune IS the root package); the release itself is mrg-keystone/actions/gh-release.
#
# `paths-ignore` stops pushes that touch ONLY runtime-owned or non-binary facets
# (the keep/ runtime source, the e2e/examples/docs/todos facets, incl. the
# runtime's auto-bump commit) from rebuilding rune's 3 binary targets. The rune
# binary's real inputs are src/, lang/ (incl. keywords.json), skills/ (the five
# skills: rune:spec/build/framework/cake/docs), and scripts/ (the gen scripts) —
# none of which are ignored here. NOTE: GitHub does not apply
# paths-ignore to TAG pushes, so `v*` snapshot releases still build. If a `v*`
# tag is ever unexpectedly skipped, move the tag trigger into its own workflow.
on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths-ignore:
      - "keep/**"
      - "e2e/**"
      - "examples/**"
      - "docs/**"
      - "todos/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-rune-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest # cross-compiled from arm64 (macos-13 runners unavailable)
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build rune + rune-lsp + rune-syntax (target ${{ matrix.target }})
        run: |
          deno run --allow-read --allow-run --allow-write src/bootstrap/config.ts
          deno run --allow-read --allow-write scripts/gen-shape-docs.ts
          deno run --allow-read --allow-run --allow-write --allow-env scripts/gen-version.ts
          deno compile --allow-read --allow-write --allow-net --allow-env --allow-run \
            --target ${{ matrix.target }} -o dist/rune src/bootstrap/mod.ts
          (cd lang && cargo build --release --target ${{ matrix.target }})
          mkdir -p dist
          cp "lang/target/${{ matrix.target }}/release/rune-lsp" \
             "lang/target/${{ matrix.target }}/release/rune-syntax" dist/

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force dist/rune dist/rune-lsp dist/rune-syntax

      - name: Package
        # The Claude Code skills ship INSIDE the tarball as a skill/ dir holding
        # all five skill folders (rune:spec/build/framework/cake/docs), so a
        # pinned install gets the skills matching its binaries (install.sh
        # extracts the skill/ dir and installs each folder). evals/ is dev-only
        # and not shipped.
        run: |
          rm -rf dist/skill && mkdir -p dist/skill
          cp -R skills/. dist/skill/
          tar -C dist -czf "rune-${{ matrix.target }}.tar.gz" rune rune-lsp rune-syntax skill
          shasum -a 256 "rune-${{ matrix.target }}.tar.gz" > "rune-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          # upload-artifact paths are relative to the workspace (repo) root.
          path: rune-${{ matrix.target }}.tar.gz*
          retention-days: 3

  # The commit this release was built from, shipped as a sibling asset so
  # `rune -v` can tell whether an installed binary is stale WITHOUT reading the
  # git `latest` tag (which gh-release freezes — it lags the served binary by
  # weeks). commit.txt is uploaded into the same `latest` release as the
  # binaries, so it can never disagree with what you'd download. Emitted as a
  # `release-*` artifact so the existing artifact-pattern picks it up.
  meta:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.sha }}" > commit.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-meta
          path: commit.txt
          retention-days: 3

  release:
    needs: [build, meta]
    uses: mrg-keystone/actions/.github/workflows/gh-release.yml@main
    permissions:
      contents: write
    with:
      artifact-pattern: release-*
      # rune's asset surface is a contract with install.sh + `rune update`: the
      # skills ship as a skill/ dir INSIDE each tarball (all five skill folders),
      # not as separately packed assets — so pack-skills stays off.
      pack-skills: false
      extra-assets: |
        scripts/install.sh
        scripts/uninstall.sh
