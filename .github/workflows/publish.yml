name: Publish to JSR

# Both halves are org reusable workflows (mrg-keystone/actions):
#   - jsr-publish: validate -> settle in-flight -> next version -> bump ->
#     registry-watched publish (all the hang/version defenses live there).
#   - gh-release: each skills/<name>/ dir ships as <name>-skill.tar.gz on the
#     rolling `latest` release, plus the installer, version-matched to the
#     JSR publish that just landed.
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    uses: mrg-keystone/actions/.github/workflows/jsr-publish.yml@main
    secrets:
      JSR_TOKEN: ${{ secrets.JSR_TOKEN }}

  skill-release:
    needs: publish
    uses: mrg-keystone/actions/.github/workflows/gh-release.yml@main
    permissions:
      contents: write
    with:
      extra-assets: |
        scripts/install.sh
